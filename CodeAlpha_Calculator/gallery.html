<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Image Gallery</title>

<style>
/* ---------- GLOBAL ---------- */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    min-height: 100vh;
    padding: 40px;
    background: #e6f2ff; /* LIGHT BLUE */
    color: #333;
}

/* ---------- HEADING ---------- */
h1 {
    text-align: center;
    margin-bottom: 25px;
    letter-spacing: 1.5px;
    color: #1a4d80;
}

/* ---------- FILTER BUTTONS ---------- */
.filters {
    text-align: center;
    margin-bottom: 30px;
}

.filters button {
    padding: 10px 22px;
    margin: 5px;
    border: none;
    border-radius: 25px;
    background: #cce4ff;
    color: #1a4d80;
    cursor: pointer;
    transition: 0.3s;
}

.filters button:hover,
.filters button.active {
    background: #1a4d80;
    color: #fff;
}

/* ---------- GALLERY GRID ---------- */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

/* ---------- CARD ---------- */
.card {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);
    cursor: pointer;
    transition: transform 0.35s ease, box-shadow 0.35s ease;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 35px rgba(0,0,0,0.2);
}

/* ---------- IMAGE (SAME SIZE FOR ALL) ---------- */
.card img {
    width: 100%;
    height: 220px;   /* FIXED HEIGHT */
    object-fit: cover;
    transition: transform 0.4s ease, filter 0.4s ease;
}

.card:hover img {
    transform: scale(1.15);
    filter: brightness(110%);
}

/* ---------- OVERLAY ---------- */
.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
    color: #fff;
    opacity: 0;
    transition: opacity 0.35s ease;
}

.card:hover .overlay {
    opacity: 1;
}

/* ---------- LIGHTBOX ---------- */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.lightbox img {
    max-width: 85%;
    max-height: 85%;
    border-radius: 12px;
}

/* ---------- LIGHTBOX CONTROLS ---------- */
.close, .prev, .next {
    position: absolute;
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    user-select: none;
}

.close {
    top: 25px;
    right: 35px;
}

.prev {
    left: 35px;
}

.next {
    right: 35px;
}

/* ---------- RESPONSIVE ---------- */
@media (max-width: 600px) {
    body {
        padding: 20px;
    }
    .card img {
        height: 200px;
    }
}
</style>
</head>

<body>

<h1>🍽️ Food Image Gallery</h1>

<!-- FILTERS -->
<div class="filters">
    <button class="active" onclick="filterImages('all', this)">All</button>
    <button onclick="filterImages('breakfast', this)">Breakfast</button>
    <button onclick="filterImages('lunch', this)">Lunch</button>
    <button onclick="filterImages('dessert', this)">Desserts</button>
</div>

<!-- GALLERY -->
<div class="gallery">

    <div class="card breakfast">
        <img src="https://images.unsplash.com/photo-1504754524776-8f4f37790ca0">
        <div class="overlay">Breakfast</div>
    </div>

    <div class="card lunch">
        <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe">
        <div class="overlay">Lunch</div>
    </div>

    <div class="card dessert">
        <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587">
        <div class="overlay">Dessert</div>
    </div>

    <div class="card breakfast">
        <img src="https://images.unsplash.com/photo-1525351484163-7529414344d8">
        <div class="overlay">Breakfast</div>
    </div>

    <div class="card lunch">
        <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
        <div class="overlay">Lunch</div>
    </div>

    <div class="card dessert">
        <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
        <div class="overlay">Dessert</div>
    </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <span class="prev">&#10094;</span>
    <img>
    <span class="next">&#10095;</span>
</div>

<script>
const cards = document.querySelectorAll(".card");
const lightbox = document.getElementById("lightbox");
const lightboxImg = lightbox.querySelector("img");

let currentIndex = 0;

/* OPEN LIGHTBOX */
cards.forEach((card, index) => {
    card.addEventListener("click", () => {
        currentIndex = index;
        lightboxImg.src = card.querySelector("img").src;
        lightbox.style.display = "flex";
    });
});

/* CLOSE */
document.querySelector(".close").onclick = () => {
    lightbox.style.display = "none";
};

/* NEXT */
document.querySelector(".next").onclick = () => {
    currentIndex = (currentIndex + 1) % cards.length;
    lightboxImg.src = cards[currentIndex].querySelector("img").src;
};

/* PREV */
document.querySelector(".prev").onclick = () => {
    currentIndex = (currentIndex - 1 + cards.length) % cards.length;
    lightboxImg.src = cards[currentIndex].querySelector("img").src;
};

/* FILTER */
function filterImages(category, btn) {
    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    cards.forEach(card => {
        card.style.display =
            category === "all" || card.classList.contains(category)
            ? "block"
            : "none";
    });
}
</script>

</body>
</html>
